# ============================================================
# Azure DevOps Pipeline – Selenium Automation with SonarCloud
# Author: Sana Ansari
#
# Purpose
# - Run Selenium TestNG automation
# - Generate automation reports
# - Publish test results to Azure DevOps
# - Publish reports as build artifacts
# - Run SonarCloud static code analysis
#
# Environment
# Java 11 → Selenium build
# Java 17 → SonarCloud analysis
# ============================================================

trigger:
- main


# ------------------------------------------------------------
# Use Self-Hosted Agent (installed on your laptop)
# ------------------------------------------------------------
pool:
  name: Default


steps:

# ------------------------------------------------------------
# STEP 1 – Verify Default Java (Java 11)
# ------------------------------------------------------------
- script: |
    echo Current JAVA_HOME=%JAVA_HOME%
    where java
    java -version
  displayName: 'Verify Default Java (Java 11)'


# ------------------------------------------------------------
# STEP 2 – Verify Maven Installation
# ------------------------------------------------------------
- script: |
    where mvn
    mvn -version
  displayName: 'Verify Maven Installation'


# ------------------------------------------------------------
# STEP 3 – Build Project and Run Selenium Tests
#
# mvn clean test will:
# 1. Clean previous builds
# 2. Compile project
# 3. Run TestNG tests
# 4. Generate Surefire reports
# ------------------------------------------------------------
- script: |
    mvn -B clean test
  displayName: 'Build and Run Selenium Tests'


# ------------------------------------------------------------
# STEP 4 – Clean Sonar Maven Cache
# Prevent corrupted plugin downloads
# ------------------------------------------------------------
- script: |
    IF EXIST "C:\Windows\ServiceProfiles\NetworkService\.m2\repository\org\sonarsource" (
        rmdir /s /q "C:\Windows\ServiceProfiles\NetworkService\.m2\repository\org\sonarsource"
    )
  displayName: 'Clean Sonar Maven Cache'


# ------------------------------------------------------------
# STEP 5 – Switch to Java 17 for SonarCloud
# Sonar scanner requires Java 17+
# ------------------------------------------------------------
- script: |
    echo Switching to Java 17 for SonarCloud

    set JAVA_HOME=C:\Program Files\Eclipse Adoptium\jdk-17.0.18.8-hotspot
    set PATH=%JAVA_HOME%\bin;%PATH%

    echo JAVA_HOME=%JAVA_HOME%
    java -version
  displayName: 'Switch to Java 17 for Sonar'


# ------------------------------------------------------------
# STEP 6 – Run SonarCloud Static Code Analysis
# Force plugin version to avoid Maven plugin container errors
# ------------------------------------------------------------
- script: |
    mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar ^
      -Dsonar.projectKey=newsana22_scb-login-automation ^
      -Dsonar.organization=newsana22 ^
      -Dsonar.host.url=https://sonarcloud.io ^
      -Dsonar.login=$(SONAR_TOKEN)
  displayName: 'Run SonarCloud Analysis'


# ------------------------------------------------------------
# STEP 7 – Publish Test Results to Azure DevOps
# ------------------------------------------------------------
- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/surefire-reports/TEST-*.xml'


# ------------------------------------------------------------
# STEP 8 – Publish Automation Reports as Artifacts
# ------------------------------------------------------------
- task: PublishBuildArtifacts@1
  displayName: 'Publish Automation Reports'
  condition: succeededOrFailed()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)'
    ArtifactName: 'automation-test-reports'
    publishLocation: 'Container'