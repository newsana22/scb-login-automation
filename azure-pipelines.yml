# ============================================================
# Azure DevOps Pipeline – Selenium Automation with SonarCloud
# Clean CI Pipeline using Java 17 + JaCoCo Coverage
# ============================================================

trigger:
  - main

pool:
  name: Default

steps:

  # ------------------------------------------------------------
  # STEP 1 – Verify Java (Agent Environment)
  # ------------------------------------------------------------
  - script: |
      echo JAVA_HOME=%JAVA_HOME%
      java -version
    displayName: 'Verify Java Environment'

  # ------------------------------------------------------------
  # STEP 2 – Verify Maven
  # ------------------------------------------------------------
  - script: |
      mvn -version
    displayName: 'Verify Maven Installation'

  # ------------------------------------------------------------
  # STEP 3 – Run Selenium Tests + JaCoCo + SonarCloud Analysis
  # ------------------------------------------------------------
  - script: |
      mvn -B clean verify sonar:sonar ^
        -Dsonar.token=$(SONAR_TOKEN)
    displayName: 'Run Selenium Tests and SonarCloud Analysis'

  # ------------------------------------------------------------
  # STEP 4 – Publish Test Results
  # ------------------------------------------------------------
  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  # ------------------------------------------------------------
  # STEP 5 – Publish Automation Reports
  # ------------------------------------------------------------
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Automation Reports'
    condition: succeededOrFailed()
    inputs:
      PathtoPublish: '$(System.DefaultWorkingDirectory)'
      ArtifactName: 'automation-test-reports'
      publishLocation: 'Container'