# ============================================================
# Azure DevOps Pipeline – Selenium Automation
# Author: Sana Ansari
#
# Purpose:
# - Run Selenium TestNG automation
# - Generate Extent HTML report
# - Capture screenshots on failure
# - Publish reports as pipeline artifacts
# - Run SonarCloud static code analysis using Maven
# ============================================================


# ------------------------------------------------------------
# Trigger pipeline whenever code is pushed to main branch
# ------------------------------------------------------------
trigger:
- main


# ------------------------------------------------------------
# Use your self-hosted agent (installed on your laptop)
# ------------------------------------------------------------
pool:
  name: Default


steps:


# ------------------------------------------------------------
# STEP 1 – Verify Java Installation
#
# This confirms that Java is installed on the self-hosted agent.
# Selenium + Maven require Java to run.
#
# echo JAVA_HOME  → shows Java environment path
# where java      → shows Java executable location
# java -version   → prints installed Java version
# ------------------------------------------------------------
- script: |
    echo JAVA_HOME=%JAVA_HOME%
    where java
    java -version
  displayName: 'Verify Java Version'


# ------------------------------------------------------------
# STEP 2 – Verify Maven Installation
#
# Ensures Maven is installed and available in system PATH.
#
# where mvn → shows Maven executable location
# mvn -version → prints Maven + Java environment info
# ------------------------------------------------------------
- script: |
    where mvn
    mvn -version
  displayName: 'Verify Maven Version'


# ------------------------------------------------------------
# STEP 3 – Build Project and Run Selenium Tests
#
# mvn clean test performs:
#
# clean  → removes previous build artifacts
# compile → compiles Java source code
# test   → executes TestNG Selenium tests
#
# After execution Maven generates:
#
# target/surefire-reports  → JUnit test results
# reports/                 → Extent HTML report
# screenshots/             → failure screenshots
# ------------------------------------------------------------
- script: |
    mvn clean test
  displayName: 'Build & Run Selenium Tests'


# ------------------------------------------------------------
# STEP 4 – Clean Sonar Maven Cache (Fix Plugin Conflict)
#
# Sometimes Maven downloads a corrupted Sonar plugin.
# Deleting the Sonar plugin folder forces Maven to download
# a fresh version during the next run.
#
# This resolves PluginContainerException errors.
# ------------------------------------------------------------
- script: |
    rmdir /s /q "C:\Windows\ServiceProfiles\NetworkService\.m2\repository\org\sonarsource"
  displayName: 'Clean Sonar Maven Cache'


# ------------------------------------------------------------
# STEP 5 – Run SonarCloud Static Code Analysis
#
# mvn verify sonar:sonar runs:
#
# verify      → completes the Maven lifecycle
# sonar:sonar → executes SonarCloud analysis
#
# Parameters explained:
#
# sonar.projectKey  → unique SonarCloud project identifier
# sonar.organization → SonarCloud organization
# sonar.host.url → SonarCloud server URL
# sonar.login → authentication token stored in pipeline
#
# SONAR_TOKEN is stored securely in Azure DevOps variables.
# ------------------------------------------------------------
- script: |
    mvn verify sonar:sonar ^
      -Dsonar.projectKey=newsana22_scb-login-automation ^
      -Dsonar.organization=newsana22 ^
      -Dsonar.host.url=https://sonarcloud.io ^
      -Dsonar.login=$(SONAR_TOKEN)
  displayName: 'Run SonarCloud Analysis'


# ------------------------------------------------------------
# STEP 6 – Publish Test Results to Azure DevOps UI
#
# This task reads JUnit XML files generated by Maven
# and displays them in the Azure DevOps pipeline UI.
#
# condition: succeededOrFailed()
# ensures results are published even if tests fail.
# ------------------------------------------------------------
- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/surefire-reports/TEST-*.xml'


# ------------------------------------------------------------
# STEP 7 – Publish Automation Reports
#
# This uploads the following files as pipeline artifacts:
#
# Extent HTML reports
# screenshots from failed tests
# surefire reports
#
# $(System.DefaultWorkingDirectory) points to the
# root folder where the pipeline runs.
#
# Artifacts can be downloaded after pipeline execution.
# ------------------------------------------------------------
- task: PublishBuildArtifacts@1
  displayName: 'Publish Automation Reports'
  condition: succeededOrFailed()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)'
    ArtifactName: 'automation-test-reports'
    publishLocation: 'Container'